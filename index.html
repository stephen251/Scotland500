<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scotland 500</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      margin-bottom: 15px;
      padding: 8px;
      width: 300px;
      max-width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #f4f4f4;
      cursor: pointer;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }
  </style>
</head>
<body>
  <h1>Scotland 500</h1>
  <input type="text" id="searchInput" placeholder="Search table...">
  <table id="csvTable"></table>

  <script>
    const csvFile = "one-page-list.csv";
    let tableData = [];
    let headers = [];
    let sortDirection = {};

    function renderTable(data) {
      const table = document.getElementById("csvTable");
      table.innerHTML = "";

      if (!data.length) {
        table.innerHTML = "<tr><td>No data found</td></tr>";
        return;
      }

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");

      headers.forEach((header, index) => {
        const th = document.createElement("th");
        th.textContent = header;
        th.addEventListener("click", () => sortTable(index));
        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      data.forEach(row => {
        const tr = document.createElement("tr");
        headers.forEach(header => {
          const td = document.createElement("td");
          td.textContent = row[header] ?? "";
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
    }

    function sortTable(columnIndex) {
      const header = headers[columnIndex];
      sortDirection[header] = !sortDirection[header];

      tableData.sort((a, b) => {
        const valA = String(a[header] ?? "");
        const valB = String(b[header] ?? "");

        return sortDirection[header]
          ? valA.localeCompare(valB, undefined, { numeric: true })
          : valB.localeCompare(valA, undefined, { numeric: true });
      });

      renderTable(tableData);
    }

    function filterTable(searchTerm) {
      const filtered = tableData.filter(row =>
        headers.some(header =>
          String(row[header] ?? "").toLowerCase().includes(searchTerm.toLowerCase())
        )
      );
      renderTable(filtered);
    }

    Papa.parse(csvFile, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        tableData = results.data;
        if (tableData.length > 0) {
          headers = Object.keys(tableData[0]);
          renderTable(tableData);
        } else {
          document.getElementById("csvTable").innerHTML = "<tr><td>No data found</td></tr>";
        }
      },
      error: function(err) {
        document.getElementById("csvTable").innerHTML =
          "<tr><td>Error loading CSV: " + err.message + "</td></tr>";
      }
    });

    document.getElementById("searchInput").addEventListener("input", function() {
      filterTable(this.value);
    });
  </script>
</body>
</html>
